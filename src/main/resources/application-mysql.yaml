spring:
  datasource:
    url: ${TICKETSYSTEM_DB_URL}
    username: ${TICKETSYSTEM_DB_USERNAME}
    password: ${TICKETSYSTEM_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
