spring:
  application:
    name: ticketsystem
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  sql:
    init:
      mode: never

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: false

ticket-system:
  rate-limit:
    api:
      requests-per-minute: 120
    login:
      requests-per-minute: 10
