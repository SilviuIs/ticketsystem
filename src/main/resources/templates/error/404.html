<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seite nicht gefunden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header th:replace="~{fragments/layout :: topbar}"></header>
<main class="main error-shell">
    <section class="error-panel">
        <p class="error-code">404</p>
        <p class="page-kicker">Nicht gefunden</p>
        <h1>Die angeforderte Seite existiert nicht.</h1>
        <p class="meta">
            Der Link ist ungültig, das Ticket wurde entfernt oder die Adresse wurde falsch eingegeben.
            Über die Ticketübersicht gelangst du zurück in den regulären Arbeitsbereich.
        </p>
        <div class="form-actions">
            <a class="btn btn-primary" href="/tickets" th:if="${currentUsername != null}">Zur Ticketuebersicht</a>
            <a class="btn btn-primary" href="/login" th:unless="${currentUsername != null}">Zum Login</a>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
